<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carbon IQ</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #f0fce8, #e4f7d4);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        background: white;
        border-radius: 20px;
        padding: 40px 32px;
        text-align: center;
        border: 1px solid #c8eea0;
        max-width: 400px;
        width: 100%;
      }
      h1 {
        font-size: 28px;
        color: #1a4008;
        margin-bottom: 8px;
      }
      p {
        font-size: 15px;
        color: #4a7030;
        margin-bottom: 28px;
        line-height: 1.6;
      }
      .btn {
        display: block;
        background: linear-gradient(135deg, #90d84a, #54b820);
        color: white;
        text-decoration: none;
        padding: 14px 20px;
        border-radius: 12px;
        font-weight: 700;
        font-size: 14px;
        margin-bottom: 12px;
      }
      .btn.outline {
        background: white;
        color: #c0392b;
        border: 1px solid #ffcccc;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>🌱 Carbon IQ</h1>
      <p>
        AI-Powered Carbon Emission Reporting Toolkit for vendors and small
        businesses.
      </p>
      <a class="btn" href="/privacy-policy.html">Privacy Policy</a>
      <a class="btn outline" href="/delete-account.html">Delete Account</a>
    </div>
  </body>
</html>
